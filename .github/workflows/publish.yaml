# Publish to Bazel Central Registry (BCR).
#
# Called from release.yaml's `publish` job — must run BEFORE the release
# is undrafted (finalize), because publish-to-bcr needs to download release
# artifacts from a draft release and upload attestations to it.
#
# Requires the BCR_PUBLISH_TOKEN secret (classic PAT with repo + workflow scopes)
# and a fork of bazelbuild/bazel-central-registry at the registry_fork location.

name: Publish to BCR

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      release_artifacts_run_id:
        required: true
        type: string
    secrets:
      BCR_PUBLISH_TOKEN:
        required: true

jobs:
  publish:
    # Tag-pinned (NOT SHA): slsa-verifier rejects bare-SHA builder refs in the
    # SLSA provenance that BCR verifies — see bazel-contrib/publish-to-bcr#263.
    # SHA-pinning this breaks BCR publishing.
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.4.2
    with:
      tag_name: ${{ inputs.tag_name }}
      registry_fork: clappingmonkey/bazel-central-registry
      attest: true
      draft: true
      release_artifacts_run_id: ${{ inputs.release_artifacts_run_id }}
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
