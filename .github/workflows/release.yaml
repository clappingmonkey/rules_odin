# Release pipeline: full test matrix → source archive → SLSA attestation → GitHub Release.
#
# Triggered by:
#   - Tag push (v*.*.*) — manual releases
#   - workflow_call from tag.yaml — automated releases
#
# Pipeline:
#   test (4 OS × 3 Bazel = 12 jobs) → release (release_ruleset.yaml, draft + SLSA)
#                                    → publish (publish.yaml, opens BCR PR while draft)
#                                    → finalize (undraft the release after publish succeeds)

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
    secrets:
      BCR_PUBLISH_TOKEN:
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # ---------------------------------------------------------------------------
  # Full test matrix — validates the tagged commit across all platforms.
  # Same matrix as check.yaml to ensure release quality.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }}, Bazel ${{ matrix.bazel }})
    runs-on: ${{ matrix.os }}
    # Least privilege: the test matrix only reads the repo. The write scopes
    # granted at the workflow level are for the release/publish/finalize jobs.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-latest, windows-latest]
        bazel: ["7.7.1", "8.7.0", "9.1.1"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: release-${{ matrix.os }}-${{ matrix.bazel }}
          repository-cache: true

      - name: Pin Bazel version
        shell: bash
        run: echo "${{ matrix.bazel }}" > .bazelversion

      - name: Build rules_odin
        shell: bash
        run: bazel build //...

      - name: Smoke test (e2e)
        shell: bash
        working-directory: e2e/smoke
        run: |
          echo "${{ matrix.bazel }}" > .bazelversion
          bazel test //...

      - name: Failure propagation test (e2e)
        shell: bash
        working-directory: e2e/failure_propagation
        run: |
          echo "${{ matrix.bazel }}" > .bazelversion
          bazel test //...

  # ---------------------------------------------------------------------------
  # Release: calls the shared bazel-contrib release_ruleset workflow.
  # The full test suite (root + e2e smoke + failure propagation) already ran in
  # the matrix above, so here the packaging runner only rebuilds the tagged tree
  # (`bazel build //...`) to confirm the exact source being archived compiles.
  # Root `//...` has no test targets and the e2e workspaces are separate,
  # .bazelignore'd modules, so a root `bazel test` would add nothing here.
  # Creates a DRAFT GitHub Release with SLSA L2 attestations.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: test
    # Tag-pinned (NOT SHA): slsa-verifier rejects bare-SHA builder refs in the
    # SLSA provenance that BCR verifies — see bazel-contrib/publish-to-bcr#263.
    # SHA-pinning this breaks BCR publishing.
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7.7.0
    with:
      release_files: rules_odin-*.tar.gz
      prerelease: false
      draft: true
      generate_release_notes: true
      bazel_test_command: "bazel build //..."
      tag_name: ${{ inputs.tag_name || github.ref_name }}

  # ---------------------------------------------------------------------------
  # Publish to BCR: opens a draft PR against bazelbuild/bazel-central-registry.
  # Must run while the release is still draft — publish-to-bcr downloads release
  # artifacts and uploads attestations to a draft release.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to BCR
    needs: release
    uses: ./.github/workflows/publish.yaml
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read
    with:
      tag_name: ${{ inputs.tag_name || github.ref_name }}
      release_artifacts_run_id: ${{ github.run_id }}
    secrets:
      BCR_PUBLISH_TOKEN: ${{ secrets.BCR_PUBLISH_TOKEN }}

  # ---------------------------------------------------------------------------
  # Finalize: publish the draft release after BCR PR is opened + attestations
  # attached. Runs only after publish succeeds.
  # ---------------------------------------------------------------------------
  finalize:
    name: Publish release
    needs: [release, publish]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag_name || github.ref_name }}
        run: gh release edit "$TAG" --draft=false
