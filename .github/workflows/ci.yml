name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  buildifier:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
        bazel: ["7.7.1", "8.7.0", "9.1.1"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.bazel }}
          repository-cache: true

      - name: Pin Bazel version
        shell: bash
        run: echo "${{ matrix.bazel }}" > .bazelversion

      - name: Build rules_odin
        shell: bash
        run: bazel build //...

      - name: Smoke test
        shell: bash
        working-directory: e2e/smoke
        run: |
          echo "${{ matrix.bazel }}" > .bazelversion
          bazel build //...

  ci:
    needs: [buildifier, build]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.buildifier.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "CI failed: buildifier=${{ needs.buildifier.result }}, build=${{ needs.build.result }}"
            exit 1
          fi
